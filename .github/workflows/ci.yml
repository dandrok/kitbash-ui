name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # v4 — pin full commit SHA (supply-chain policy)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        # v2 — pin full commit SHA
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Token drift check
        run: bun run tokens:check

      - name: Biome CI (lint + format)
        run: bun run ci

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun run test

      - name: Build (kitbash)
        # Use package script so PATH resolves kitbash via bun
        run: bun run build
