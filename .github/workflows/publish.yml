# Publish @ktbsh/ui to npm when a version tag is pushed.
# Example: package.json "version": "0.1.0" → git tag v0.1.0 && git push origin v0.1.0
#
# Requires repo secret: NPM_TOKEN (npm granular token, @ktbsh read+write).

name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Assert tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(bun -e 'console.log(require("./package.json").version)')"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v${TAG} must match package.json version ${PKG}"
            exit 1
          fi

      - name: Verify (lint, typecheck, build, test, Storybook)
        run: bun run verify

      - name: Setup Node (npm registry auth)
        # v4 — pin full commit SHA (supply-chain policy)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish @ktbsh/ui
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
